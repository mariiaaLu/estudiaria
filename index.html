<script>

const API_URL = "https://TU-PROYECTO.onrender.com";

let categoria = "ESO";
let textoPDF = "";

// categoría
function setCat(el, c){

  categoria = c;

  document.querySelectorAll(".option")
    .forEach(e => e.classList.remove("active"));

  el.classList.add("active");

  textoPDF = "";

  document.getElementById("file").value = "";

  document.getElementById("resultado").innerHTML =
    "Esperando PDF...";

  document.getElementById("dropzone").innerHTML =
    "📄 Haz clic o arrastra un PDF aquí";
}

// formato
function format(text){

  return text
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
}

// PDF
async function upload(){

  const file = document.getElementById("file").files[0];

  if(!file){
    alert("Selecciona un PDF");
    return;
  }

  const modo = document.getElementById("modo").value;
  const resBox = document.getElementById("resultado");

  try{

    resBox.innerHTML = "📄 Leyendo PDF...";

    const form = new FormData();
    form.append("file", file);

    const res = await fetch(`${API_URL}/upload`, {
      method:"POST",
      body:form
    });

    const data = await res.json();

    textoPDF = data.texto;

    if(!textoPDF){

      resBox.innerHTML = "Error leyendo PDF";
      return;
    }

    resBox.innerHTML = "🧠 Generando IA...";

    const resIA = await fetch(`${API_URL}/resumir`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        texto:textoPDF,
        categoria,
        modo
      })
    });

    const dataIA = await resIA.json();

    resBox.innerHTML = format(dataIA.resultado);

  }catch(err){

    console.error(err);

    resBox.innerHTML =
      "❌ Error conectando con el servidor";
  }
}

// TEXTO MANUAL
async function uploadText(){

  const text = document.getElementById("userText").value;

  if(!text || text.trim().length < 5){

    alert("Escribe un texto válido");
    return;
  }

  const modo = document.getElementById("modo").value;
  const resBox = document.getElementById("resultado");

  try{

    resBox.innerHTML = "🧠 Generando IA...";

    const resIA = await fetch(`${API_URL}/resumir`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        texto:text,
        categoria,
        modo
      })
    });

    const dataIA = await resIA.json();

    resBox.innerHTML = format(dataIA.resultado);

  }catch(err){

    console.error(err);

    resBox.innerHTML =
      "❌ Error conectando con el servidor";
  }
}

// nombre archivo
document.getElementById("file")
.addEventListener("change",(e)=>{

  const name = e.target.files[0]?.name;

  if(name){

    document.getElementById("dropzone").innerHTML =
      "📄 " + name;
  }
});

</script>
