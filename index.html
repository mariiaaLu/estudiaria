<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EstudiaIA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

.sidebar{
  width:250px;
  background:#111827;
  padding:20px;
}

.option{
  padding:10px;
  margin:8px 0;
  background:#1f2937;
  border-radius:8px;
  cursor:pointer;
}

.active{ background:#2563eb !important; }

.main{
  flex:1;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.dropzone{
  border:2px dashed #3b82f6;
  padding:20px;
  border-radius:12px;
  text-align:center;
  margin-bottom:10px;
  cursor:pointer;
  background:#0b1220;
  transition:0.2s;
}

.dropzone:hover{
  background:#111827;
}

input[type="file"]{
  display:none;
}

select, button{
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{ background:#1d4ed8; }

.result{
  flex:1;
  margin-top:10px;
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  overflow:auto;
}

strong{ color:#38bdf8; }
</style>
</head>

<body>

<div class="sidebar">
<h2>📚 EstudiaIA</h2>

<div class="option active" onclick="setCat(this,'Primaria')">📖 Primaria</div>
<div class="option" onclick="setCat(this,'ESO')">🎓 ESO</div>
<div class="option" onclick="setCat(this,'Bachillerato')">📘 Bachillerato</div>
<div class="option" onclick="setCat(this,'Universidad')">🏫 Universidad</div>
<div class="option" onclick="setCat(this,'Oposiciones')">📑 Oposiciones</div>
</div>

<div class="main">

<h3>1️⃣ Selecciona el tipo de resultado</h3>

<select id="modo">
  <option value="resumen">🧠 Resumen</option>
  <option value="facil">📘 Fácil</option>
  <option value="test">❓ Test</option>
  <option value="ultra">⚡ Ultra corto</option>
</select>

<h3>2️⃣ Subir PDF</h3>

<label class="dropzone" for="file" id="dropzone">
📄 Haz clic o arrastra un PDF aquí
</label>

<input type="file" id="file" accept="application/pdf">

<button onclick="upload()">🚀 Subir y generar</button>

<!-- 🔥 AÑADIDO NUEVO BLOQUE -->
<h3>3️⃣ Escribir texto manual</h3>

<textarea id="userText" placeholder="Escribe aquí tu tema..."
style="
width:100%;
height:120px;
border-radius:10px;
padding:10px;
border:none;
outline:none;
background:#0b1220;
color:white;
resize:none;
"></textarea>

<button onclick="uploadText()">🧠 Generar desde texto</button>

<div class="result" id="resultado">Esperando PDF...</div>

</div>

<script>

let categoria = "ESO";
let textoPDF = "";

// categoría
function setCat(el, c){
  categoria = c;

  document.querySelectorAll(".option")
    .forEach(e => e.classList.remove("active"));

  el.classList.add("active");

  textoPDF = "";
  document.getElementById("file").value = "";
  document.getElementById("resultado").innerHTML = "Esperando PDF...";

  document.getElementById("dropzone").innerHTML =
    "📄 Haz clic o arrastra un PDF aquí";
}

// formato
function format(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
}

// PDF
async function upload(){

  const file = document.getElementById("file").files[0];
  if(!file) return alert("Selecciona un PDF");

  const modo = document.getElementById("modo").value;
  const resBox = document.getElementById("resultado");

  resBox.innerHTML = "📄 Leyendo PDF...";

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("http://localhost:3000/upload", {
    method:"POST",
    body:form
  });

  const data = await res.json();

  textoPDF = data.texto;

  if(!textoPDF){
    resBox.innerHTML = "Error leyendo PDF";
    return;
  }

  resBox.innerHTML = "🧠 Generando IA...";

  const resIA = await fetch("http://localhost:3000/resumir", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      texto: textoPDF,
      categoria,
      modo
    })
  });

  const dataIA = await resIA.json();

  resBox.innerHTML = format(dataIA.resultado);
}

// 🔥 NUEVO: TEXTO MANUAL
async function uploadText(){

  const text = document.getElementById("userText").value;

  if(!text || text.trim().length < 5){
    alert("Escribe un texto válido");
    return;
  }

  const modo = document.getElementById("modo").value;
  const resBox = document.getElementById("resultado");

  resBox.innerHTML = "🧠 Generando IA...";

  const resIA = await fetch("http://localhost:3000/resumir", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      texto: text,
      categoria,
      modo
    })
  });

  const dataIA = await resIA.json();

  resBox.innerHTML = format(dataIA.resultado);
}

// mostrar nombre archivo
document.getElementById("file").addEventListener("change", (e)=>{
  const name = e.target.files[0]?.name;
  if(name){
    document.getElementById("dropzone").innerHTML =
      "📄 " + name;
  }
});

</script>

</body>
</html>
